<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Grabber</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #777;
            margin-bottom: 28px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: #4a90d9; }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #4a90d9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        button:hover { background: #3a7bc8; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .result-box {
            display: none;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 16px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-header h2 { font-size: 1.1rem; }

        .actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .icon-btn:hover { background: #f0f0f0; }

        .transcript-text {
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .summarize-row {
            display: none;
            margin-bottom: 16px;
        }

        .summarize-btn {
            background: #7c3aed;
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            border-radius: 8px;
        }

        .summarize-btn:hover { background: #6d28d9; }

        .summary-box {
            display: none;
            background: #fff;
            border-left: 4px solid #7c3aed;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
        }

        .summary-content {
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .summary-content strong { display: inline; }

        .summary-content ul {
            margin: 4px 0 12px 20px;
        }

        .summary-content li {
            margin-bottom: 4px;
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Transcript Grabber</h1>
        <p class="subtitle">Paste a YouTube link to get its transcript and AI summary.</p>

        <div class="input-row">
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
            <button id="fetchBtn" onclick="fetchTranscript()">Get Transcript</button>
        </div>

        <div id="error" class="error" style="display:none;"></div>
        <div id="spinner" class="spinner">Fetching transcript...</div>

        <div id="result" class="result-box">
            <div class="result-header">
                <h2>Transcript</h2>
                <div class="actions">
                    <button class="icon-btn" onclick="copyText('transcript')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        Copy
                    </button>
                    <button class="icon-btn" onclick="downloadTxt('transcript', 'transcript.txt')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                </div>
            </div>
            <div id="transcript" class="transcript-text"></div>
        </div>

        <!-- Summarize button -->
        <div id="summarizeRow" class="summarize-row">
            <button class="summarize-btn" id="summarizeBtn" onclick="summarize()">Summarize with Gemini AI</button>
        </div>

        <div id="summarySpinner" class="spinner">Generating summary with Gemini...</div>

        <!-- Summary result -->
        <div id="summaryBox" class="summary-box">
            <div class="result-header">
                <h2>AI Summary</h2>
                <div class="actions">
                    <button class="icon-btn" onclick="copyText('summaryContent')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        Copy
                    </button>
                    <button class="icon-btn" onclick="downloadTxt('summaryContent', 'summary.txt')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                </div>
            </div>
            <div id="summaryContent" class="summary-content"></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') fetchTranscript();
        });

        async function fetchTranscript() {
            const url = urlInput.value.trim();
            if (!url) return;

            const btn = document.getElementById('fetchBtn');
            const error = document.getElementById('error');
            const spinner = document.getElementById('spinner');
            const result = document.getElementById('result');
            const summarizeRow = document.getElementById('summarizeRow');
            const summaryBox = document.getElementById('summaryBox');

            error.style.display = 'none';
            result.style.display = 'none';
            summarizeRow.style.display = 'none';
            summaryBox.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;

            try {
                const res = await fetch('/transcript', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (!res.ok) {
                    error.textContent = data.error;
                    error.style.display = 'block';
                } else {
                    document.getElementById('transcript').textContent = data.transcript;
                    result.style.display = 'block';
                    summarizeRow.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Something went wrong. Please try again.';
                error.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function summarize() {
            const transcript = document.getElementById('transcript').textContent;
            const btn = document.getElementById('summarizeBtn');
            const spinner = document.getElementById('summarySpinner');
            const summaryBox = document.getElementById('summaryBox');
            const error = document.getElementById('error');

            error.style.display = 'none';
            summaryBox.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;

            try {
                const res = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transcript })
                });
                const data = await res.json();

                if (!res.ok) {
                    error.textContent = data.error;
                    error.style.display = 'block';
                } else {
                    // Convert markdown-style formatting to HTML
                    let html = data.summary
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/^\* (.*)/gm, '<li>$1</li>')
                        .replace(/^- (.*)/gm, '<li>$1</li>')
                        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
                        .replace(/\n\n/g, '<br><br>')
                        .replace(/\n/g, '<br>');
                    document.getElementById('summaryContent').innerHTML = html;
                    summaryBox.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Something went wrong generating the summary.';
                error.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }

        function copyText(elementId) {
            const el = document.getElementById(elementId);
            const text = el.textContent || el.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const original = btn.innerHTML;
                btn.innerHTML = btn.innerHTML.replace('Copy', 'Copied!');
                setTimeout(() => btn.innerHTML = original, 1500);
            });
        }

        function downloadTxt(elementId, filename) {
            const el = document.getElementById(elementId);
            const text = el.textContent || el.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        }
    </script>
</body>
</html>
